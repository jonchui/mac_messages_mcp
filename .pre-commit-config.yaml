# Pre-commit: run tests before allowing commit.
# Install: pre-commit install
# Run manually: pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: message-tests
        name: mac-messages-mcp function tests
        entry: python -m unittest discover -s tests -p "test_*.py" -v
        language: system
        pass_filenames: false
